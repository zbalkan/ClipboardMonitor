name: .NET Framework Build and Test

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.ico'
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '**/*.md'
      - '**/*.png'
      - '**/*.ico'
  workflow_dispatch:


jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Setup MSBuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuildPath = & $vswhere -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuildPath) { throw "MSBuild.exe not found via vswhere." }
          Split-Path -Parent $msbuildPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup VSTest path
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vstestPath = & $vswhere -latest -find "Common7\IDE\Extensions\TestPlatform\vstest.console.exe" | Select-Object -First 1
          if (-not $vstestPath) { throw "vstest.console.exe not found via vswhere." }
          Split-Path -Parent $vstestPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Restore NuGet packages
      - name: Restore NuGet packages
        run: nuget restore src/ClipboardMonitor.sln

      # Build using MSBuild
      - name: Build with MSBuild
        run: msbuild src/ClipboardMonitor.sln /t:Build /p:Configuration=Release

      # Run unit tests
      - name: Run tests
        run: vstest.console.exe src\ClipboardMonitor.Tests\bin\Release\ClipboardMonitor.Tests.dll
